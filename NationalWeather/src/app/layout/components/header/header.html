<!-- Header content-->
<section id="header" class="blur-background">
  <div class="container mx-auto">
    <div class="header-container flex flex-col p-4 w-full">
      <!-- Place for loading spinner and continent cities-->
      <article
        class="cityes w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6"
      >
        @if (loadingService.loading()) {
          <div
            class="col-span-full flex flex-col justify-center items-center text-center p-5 m-5 text-xl"
          >
            <i class="fa-solid fa-spinner fa-spin fa-3x mr-4"></i>
            Loading cities, please wait for response!
          </div>
        } @else {
          @for (city of citiesWeather; track city.name) {
            <app-continent-city
              [name]="city.name"
              [temperature]="city.temperature"
              [icon]="city.icon"
            />
          }
        }

        <!-- Continent cities -->
      </article>
      <!-- Place for dropdown and input field-->
      <article class="selected-city w-full flex">
        <div class="inputs w-full flex flex-col items-center justify-center md:flex-row gap-6 p-4">
          <div
            class="dropdown w-full flex flex-col items-center justify-center align-middle md:w-auto m-3 p-10"
          >
            <app-dropdown (continentSelected)="onContinentSelect($event)" />
          </div>
          <!-- Here is input  -->
          <div class="serach w-full md:w-auto items-center">
            <input
              #cityInput
              type="text"
              placeholder="Find City"
              class="search-city"
              [value]="cityService.selectedCity()"
              (keyup.enter)="onCityChange(cityInput.value)"
              style="width: '100%'; outline: none"
            />
            <!-- <button (click)="onCityChange(cityInput.value)">
              <fa-icon [icon]="'magnifying-glass'"></fa-icon>
            </button> -->
          </div>
          <!-- (
        </div>
      </article>
    </div>
  </div>
</section>


<!-- (cityFromSearch)="onCityChange($event)" -->
        </div>
      </article>
    </div>
  </div>
</section>
