<!-- Weather data for single day of list of 5 days weather -->
<div class="city h-full w-full flex flex-col gap-4 blur-description items-center p-4">
  <h2 class="text-2xl">{{ date | date: 'EEEE' }}</h2>

  <div class="image w-full flex justify-center overflow-hidden">
    <img
      [src]="'https://openweathermap.org/img/wn/' + icon + '@2x.png'"
      alt="icon"
      class="w-16 h-16 sm:w-20 sm:h-20 md:h-40 md:w-40 object-cover shadow-md hover:scale-105 transition overflow-hidden"
    />
  </div>
  <div class="city-description w-full text-center">
    <h2 class="font-bold text-3xl">{{ city }}</h2>
    <span class="text-2xl">{{ weather }}</span>
    <p class="text-6xl md:text-4xl">{{ temperature | number: '1.0-0' }} °C</p>
  </div>
</div>
