<!-- Dropdown menu-->
<div class="card w-full flex flex-col md:flex-row items-center gap-3">
  <label>Region</label>
  <p-autocomplete
    class="w-full"
    [(ngModel)]="selectedItem"
    [virtualScroll]="true"
    [suggestions]="filteredItems"
    [virtualScrollItemSize]="34"
    (completeMethod)="filterItems($event)"
    (onSelect)="onSelect($event)"
    optionLabel="label"
    [dropdown]="true"
    placeholder="Select continent"
    appendTo="body"
    [style]="{
      width: '100%',
      'background-color': 'rgb(65, 65, 65)',
      padding: '10px',
      'border-radius': '15px',
      color: 'white',
    }"
    [panelStyle]="{
      'background-color': '#fff',
      color: 'black',
      border: '1px solid #ccc',
      'box-shadow': '0 2px 6px rgba(0,0,0,0.15)',
      'border-radius': '8px',
      padding: '10px',
    }"
  />
</div>
